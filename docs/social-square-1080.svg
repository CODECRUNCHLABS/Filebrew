<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Filebrew — convert videos and images locally">
  <defs>
    <radialGradient id="bg-1" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#1c1c3a"/>
      <stop offset="100%" stop-color="#0f0f10" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-2" cx="50%" cy="100%" r="70%">
      <stop offset="0%"   stop-color="#3a1c2a"/>
      <stop offset="100%" stop-color="#0f0f10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="#0f0f10"/>
  <rect width="1080" height="1080" fill="url(#bg-1)"/>
  <rect width="1080" height="1080" fill="url(#bg-2)"/>

  <!-- Tag -->
  <g transform="translate(395, 130)">
    <rect width="290" height="44" rx="22" fill="#1a1a3a"/>
    <text x="145" y="29" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#b8c2ff" text-anchor="middle" letter-spacing="3">OPEN SOURCE · MIT</text>
  </g>

  <!-- Brand mark centered -->
  <g transform="translate(440, 220)">
    <rect width="200" height="200" rx="44" fill="#2a4fd0"/>
    <g fill="#ffffff">
      <rect x="52" y="44" width="28" height="112" rx="3"/>
      <rect x="52" y="44" width="100" height="28" rx="3"/>
      <rect x="52" y="88" width="68" height="26" rx="3"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="540" y="540" font-family="Helvetica, Arial, sans-serif" font-size="120" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3">Filebrew</text>

  <!-- Tagline -->
  <text x="540" y="615" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#dddddd" text-anchor="middle">Convert videos &amp; images locally.</text>
  <text x="540" y="660" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#888" text-anchor="middle">No upload. No quotas. No watermarks.</text>

  <!-- Format badges grid (5 rows × 3 cols, centered) -->
  <g transform="translate(195, 720)" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">
    <g><rect width="220" height="38" rx="7" fill="#2a4fd0"/><text x="110" y="25" text-anchor="middle">MP4</text></g>
    <g transform="translate(235,0)"><rect width="220" height="38" rx="7" fill="#0f9d58"/><text x="110" y="25" text-anchor="middle">WebM</text></g>
    <g transform="translate(470,0)"><rect width="220" height="38" rx="7" fill="#666666"/><text x="110" y="25" text-anchor="middle">MOV</text></g>

    <g transform="translate(0,54)"><rect width="220" height="38" rx="7" fill="#d04f8a"/><text x="110" y="25" text-anchor="middle">MP3</text></g>
    <g transform="translate(235,54)"><rect width="220" height="38" rx="7" fill="#7e57c2"/><text x="110" y="25" text-anchor="middle">M4A</text></g>
    <g transform="translate(470,54)"><rect width="220" height="38" rx="7" fill="#00897b"/><text x="110" y="25" text-anchor="middle">WAV</text></g>

    <g transform="translate(0,108)"><rect width="220" height="38" rx="7" fill="#f57c00"/><text x="110" y="25" text-anchor="middle">JPG</text></g>
    <g transform="translate(235,108)"><rect width="220" height="38" rx="7" fill="#2e7d32"/><text x="110" y="25" text-anchor="middle">PNG</text></g>
    <g transform="translate(470,108)"><rect width="220" height="38" rx="7" fill="#6a1b9a"/><text x="110" y="25" text-anchor="middle">AVIF</text></g>
  </g>

  <!-- Footer -->
  <text x="540" y="1010" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#888888" text-anchor="middle">by Code Crunch Labs · filebrew.vercel.app</text>
</svg>
